name: Build EXE on PR Merge to Main

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  build-exe:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Clean previous builds
        run: |
          Remove-Item -Recurse -Force build, dist
          Remove-Item -Force assistant_ia_juridique.spec

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --onefile interactif_ia_juridique.py --name assistant_ia_juridique --distpath dist --workpath build --specpath . --clean

      - name: Upload the .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: assistant_ia_juridique
          path: dist/assistant_ia_juridique.exe
